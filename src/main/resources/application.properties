spring.application.name=polaris

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/polaris
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.cors.allowed-origins=http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:4173
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

rate.limiter.type=sliding
server.address=0.0.0.0
server.port=8080

# Auth and CORS
polaris.cors.allowed-origins=http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:4173
polaris.auth.admin.username=admin
polaris.auth.admin.password=Admin@123
polaris.auth.user.username=user
polaris.auth.user.password=User@123
polaris.auth.token-ttl-seconds=43200
