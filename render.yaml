services:
  - type: keyvalue
    name: polaris-redis
    plan: free
    ipAllowList: []

  - type: web
    name: polaris-api
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: polaris-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: polaris-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: polaris-postgres
          property: password
      - key: SPRING_DATA_REDIS_URL
        fromService:
          type: keyvalue
          name: polaris-redis
          property: connectionString
      - key: POLARIS_AUTH_ADMIN_USERNAME
        value: admin
      - key: POLARIS_AUTH_ADMIN_PASSWORD
        value: Admin@123
      - key: POLARIS_AUTH_USER_USERNAME
        value: user
      - key: POLARIS_AUTH_USER_PASSWORD
        value: User@123
      - key: POLARIS_CORS_ALLOWED_ORIGINS
        value: "*"
      - key: MANAGEMENT_ENDPOINTS_WEB_CORS_ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: polaris-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: polaris-postgres
    plan: free
    databaseName: polaris
    postgresMajorVersion: "15"
    ipAllowList: []
